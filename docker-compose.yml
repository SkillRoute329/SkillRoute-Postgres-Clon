version: '3.8'

services:
  db:
    image: postgis/postgis:15-3.3
    container_name: skillroute_db
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASS:-tu_password_aqui}
      POSTGRES_DB: ${DB_NAME:-skillroute_master}
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  pgdata:

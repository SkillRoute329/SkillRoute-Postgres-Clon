<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="google" content="notranslate" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TransForma- v1.0.1 (Stable)</title>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(function (registrations) {
        for (let registration of registrations) {
          registration.unregister();
          console.log('ServiceWorker unregistered');
        }
      });
    }
    // Delete all caches
    if ('caches' in window) {
      caches.keys().then(function (names) {
        for (let name of names) caches.delete(name);
      });
    }
  </script>
</head>

<body>
  <div id="root"></div>
  <script>
    // Emergency Reset Script if React fails to load
    setTimeout(() => {
      const root = document.getElementById('root');
      if (root && (!root.hasChildNodes() || root.innerHTML.trim() === '')) {
        console.error('React failed to mount.');
        root.innerHTML = `
                <div style="font-family: system-ui, -apple-system, sans-serif; background: #0f172a; color: white; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center;">
                    <div style="background: rgba(239, 68, 68, 0.2); width: 80px; height: 80px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-bottom: 24px;">
                        <span style="font-size: 40px;">⚠️</span>
                    </div>
                    <h2 style="font-size: 24px; font-weight: bold; margin-bottom: 12px;">Problemas de Carga</h2>
                    <p style="color: #94a3b8; margin-bottom: 32px; max-width: 400px; line-height: 1.5;">
                        La aplicación está tardando demasiado o ha fallado. Esto suele ocurrir tras una actualización.
                    </p>
                    <button id="emergency-reset" style="background: #3b82f6; color: white; border: none; padding: 14px 28px; border-radius: 12px; font-weight: 600; cursor: pointer; font-size: 16px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06); transition: background 0.2s;">
                        🔄 Reparar y Recargar
                    </button>
                    <p style="margin-top: 20px; font-size: 12px; color: #64748b;">Si el problema persiste, intenta en Incógnito.</p>
                </div>
            `;
        document.getElementById('emergency-reset').addEventListener('click', async () => {
          try {
            localStorage.clear();
            sessionStorage.clear();
            if ('serviceWorker' in navigator) {
              const regs = await navigator.serviceWorker.getRegistrations();
              for (let r of regs) await r.unregister();
            }
            if ('caches' in window) {
              const keys = await caches.keys();
              await Promise.all(keys.map(k => caches.delete(k)));
            }
          } catch (e) { console.error(e); }
          window.location.reload();
        });
      }
    }, 5000); // 5 seconds timeout allow for slow networks
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>

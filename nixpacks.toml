# Nixpacks configuration for Puppeteer support
[phases.setup]
nixPkgs = ["nodejs_22", "npm-9_x", "openssl", "chromium"]
aptPkgs = [
    "libglib2.0-0", "libnss3", "libnspr4", "libatk1.0-0", "libatk-bridge2.0-0", 
    "libcups2", "libdbus-1-3", "libdrm2", "libgtk-3-0", "libgbm1", "libasound2",
    "libpango-1.0-0", "libcairo2", "libxcomposite1", "libxcursor1", 
    "libxdamage1", "libxext6", "libxfixes3", "libxi6", "libxrandr2", 
    "libxrender1", "libxss1", "libxtst6", "libuuid1"
]

[variables]
NPM_CONFIG_PRODUCTION = "false"
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"

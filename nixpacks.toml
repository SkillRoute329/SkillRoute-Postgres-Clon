# Nixpacks configuration for Puppeteer support
[phases.setup]
nixPkgs = [
    "nodejs_22",
    "npm-9_x",
    "openssl",
    "chromium",
    "glib",
    "nss",
    "nspr",
    "freetype",
    "fontconfig",
    "harfbuzz",
    "expat",
    "libuuid",
    "libdrm",
    "mesa",
    "alsa-lib",
    "cups",
    "dbus",
    "at-spi2-atk",
    "at-spi2-core",
    "cairo",
    "pango",
    "gdk-pixbuf",
    "gtk3",
    "xorg.libX11",
    "xorg.libXcomposite",
    "xorg.libXdamage",
    "xorg.libXext",
    "xorg.libXfixes",
    "xorg.libXrandr",
    "xorg.libXrender",
    "xorg.libXScrnSaver",
    "xorg.libXtst",
    "xorg.libxcb",
    "xorg.libXcursor",
    "xorg.libXi"
]

[variables]
NPM_CONFIG_PRODUCTION = "false"
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"

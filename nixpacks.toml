# Nixpacks configuration for Puppeteer support
[phases.setup]
nixPkgs = ["nodejs_22", "npm-9_x", "openssl", "chromium"]
aptPkgs = [
    "glib2.0-dev", "nss", "nspr", "atk", "at-spi2-atk", 
    "cups", "dbus", "libdrm", "gtk3", "pango", "cairo", 
    "libxcomposite", "libxcursor", "libxdamage", "libxext", 
    "libxfixes", "libxi", "libxrandr", "libxrender", 
    "libxss", "libxtst", "libuuid", "alsa-lib"
]

[variables]
NPM_CONFIG_PRODUCTION = "false"
PUPPETEER_CACHE_DIR = "/app/.cache/puppeteer"

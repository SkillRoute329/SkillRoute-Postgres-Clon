
name: Ops-Trigger Executor

on:
  push:
    paths:
      - 'ops/manifest.json'

jobs:
  ops_executor:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Read Manifest Command
        id: read_manifest
        run: |
          COMMAND=$(jq -r '.command' ops/manifest.json)
          echo "COMMAND=$COMMAND" >> $GITHUB_ENV
          echo "Detected Ops Command: $COMMAND"

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Install Backend Dependencies
        working-directory: ./backend
        run: npm install

      # --- EXECUTION BRANCHES ---

      # BRANCH 1: DEPLOY & SAFE SEED
      - name: Execute Deploy & Seed
        if: env.COMMAND == 'DEPLOY_AND_SEED'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚀 Starting Deployment..."
          railway up --service backend --detach
          
          echo "⏳ Waiting for service to stabilize..."
          sleep 60
          
          echo "🌱 Running Safe Seed..."
          # We run this command against the production DB via Railway CLI or env vars if locally available
          # Ideally, we trigger the script inside the deployed instance or connect directly.
          # For simplicity here, we assume we connect via connection string injected by Railway or direct run if networking allows.
          # A safer pattern is to trigger the backend execution via a specialized protected endpoint, or run 'railway run'
          
          cd backend
          npx prisma generate
          # Run the safe seed script using Railway's environment context
          railway run npm run seed:safe

      # BRANCH 2: RESET ADMIN
      - name: Execute Admin Reset
        if: env.COMMAND == 'RESET_ADMIN'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🛡️ Resetting Admin Access..."
          cd backend
          railway run npm run rescue

      # BRANCH 3: FULL SIMULATION
      - name: Execute Full Simulation
        if: env.COMMAND == 'FULL_SIMULATION'
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "🚦 Triggering Traffic Simulation..."
          cd backend
          railway run npx tsx src/workers/simulateTraffic.ts

      - name: Report Status
        if: always()
        run: echo "Ops Execution Completed."

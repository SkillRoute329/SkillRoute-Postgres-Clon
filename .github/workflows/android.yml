name: Build Android APK Issues Fix
on:
  push:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Java 17
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd frontend
          npm install

      - name: Build Frontend Project
        run: |
          cd frontend
          npm run build
        env:
          VITE_API_URL: "https://transformafacil-20-production.up.railway.app"

      - name: Sync Capacitor
        run: |
          cd frontend
          npx cap sync android

      - name: Build APK with Gradle
        run: |
          cd frontend/android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v3
        with:
          name: Transforma-App-Debug
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk

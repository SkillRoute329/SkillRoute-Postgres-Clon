
name: Railway Auto-Deploy & Watchdog

on:
  push:
    branches:
      - master
      - main

jobs:
  deploy_and_verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install Railway CLI
        run: npm i -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service backend --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait for Deployment
        run: sleep 60

      - name: Health Check (Watchdog)
        run: |
           STATUS=$(curl -o /dev/null -s -w "%{http_code}\n" https://${{ secrets.RAILWAY_URL }}/api/health)
           if [ "$STATUS" == "200" ]; then
             echo "✅ Deployment Successful. System Healthy."
           else
             echo "❌ Deployment Unhealthy (Status: $STATUS). Check Logs."
             exit 1
           fi

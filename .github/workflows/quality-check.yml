name: '🧪 QUALITY: Pre-flight & Lint'
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies (Root)
        run: npm install

      - name: Formato & Lint (Root)
        run: |
          npm run format
          # npm run lint # Opcional si se configura completamente

      - name: Build Check (Frontend)
        run: |
          cd frontend
          npm install
          npm run build

      - name: Build Check (Backend)
        run: |
          cd backend
          npm install
          # npm run build # Si existe

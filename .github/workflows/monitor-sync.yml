name: Production Sync Guard

on:
  push:
    branches:
      - main
      - master

jobs:
  sync-branches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git Identity
        run: |
          git config --global user.name "Antigravity Sync Bot"
          git config --global user.email "bot@antigravity.ai"

      - name: Sync Main -> Master (Production Trigger)
        if: github.ref == 'refs/heads/main'
        run: |
          echo "🔄 Detected push to MAIN. Syncing MASTER..."
          git checkout master
          git merge main --allow-unrelated-histories -m "chore(sync): automated sync from main"
          git push origin master

      - name: Sync Master -> Main (Reverse Guard)
        if: github.ref == 'refs/heads/master'
        run: |
          echo "🔄 Detected push to MASTER. Keeping MAIN updated..."
          git checkout main
          git merge master --allow-unrelated-histories -m "chore(sync): automated sync from master"
          git push origin main
